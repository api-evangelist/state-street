meters:
  - name: contracted_engagement
    description: Placeholder for line items defined in a State Street institutional / partner contract.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility comes from the State Street client reporting workflow tied to the underlying
      asset-servicing contract — there is no public usage / billing API.
  - name: Allocation
    description: Allocate the institutional engagement cost in your own ERP; State Street does not
      surface a self-serve cost breakdown for API consumption.
  - name: Optimization
    description: Optimization happens via contract review, scope renegotiation, or product-mix changes
      with the API Platform Management team.
  - name: Accountability
    description: A named institutional client owner should hold the State Street engagement cost line
      and renewal cycle.
