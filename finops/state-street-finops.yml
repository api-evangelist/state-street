description: State Street has a developer portal for institutional API products but no public, metered
  billing surface. Costs land inside the broader institutional client agreement; there is no FOCUS-billable
  per-call price list to reconcile.
sources:
  - https://developer.statestreet.com/
notes: No public State Street API pricing or invoice surface. Meters and FOCUS columns are placeholders
  pending a contracted engagement.
