naftiko: 1.0.0-alpha2
info:
  label: State Street Fund Connect API — Orders
  description: 'State Street Fund Connect API — Orders. 4 operations. Lead operation: Create ETF Order. Self-contained Naftiko
    capability covering one State Street business surface.'
  tags:
  - State Street
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATE_STREET_API_KEY: STATE_STREET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fund-connect-orders
    baseUri: https://api.statestreet.com/v1/fund-connect
    description: State Street Fund Connect API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createorder
        method: POST
        description: Create ETF Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listorders
        method: GET
        description: List ETF Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fundId
          in: query
          type: string
          description: Filter by fund identifier
        - name: status
          in: query
          type: string
          description: Filter by order status
        - name: startDate
          in: query
          type: string
        - name: endDate
          in: query
          type: string
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get ETF Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          description: Unique order identifier
          required: true
    - name: orders-orderId-cancel
      path: /orders/{orderId}/cancel
      operations:
      - name: cancelorder
        method: POST
        description: Cancel ETF Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          description: Unique order identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.STATE_STREET_API_KEY}}'
  exposes:
  - type: rest
    namespace: fund-connect-orders-rest
    port: 8080
    description: REST adapter for State Street Fund Connect API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: createorder
        description: Create ETF Order
        call: fund-connect-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listorders
        description: List ETF Orders
        call: fund-connect-orders.listorders
        with:
          fundId: rest.fundId
          status: rest.status
          startDate: rest.startDate
          endDate: rest.endDate
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Get ETF Order
        call: fund-connect-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}/cancel
      name: orders-orderid-cancel
      description: REST surface for orders-orderId-cancel.
      operations:
      - method: POST
        name: cancelorder
        description: Cancel ETF Order
        call: fund-connect-orders.cancelorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fund-connect-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for State Street Fund Connect API — Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-etf-order
      description: Create ETF Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fund-connect-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-etf-orders
      description: List ETF Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fund-connect-orders.listorders
      with:
        fundId: tools.fundId
        status: tools.status
        startDate: tools.startDate
        endDate: tools.endDate
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: get-etf-order
      description: Get ETF Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fund-connect-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-etf-order
      description: Cancel ETF Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fund-connect-orders.cancelorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
