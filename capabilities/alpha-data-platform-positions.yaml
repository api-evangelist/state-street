naftiko: 1.0.0-alpha2
info:
  label: State Street Alpha Data Platform API — Positions
  description: 'State Street Alpha Data Platform API — Positions. 1 operations. Lead operation: List Portfolio Positions.
    Self-contained Naftiko capability covering one State Street business surface.'
  tags:
  - State Street
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATE_STREET_API_KEY: STATE_STREET_API_KEY
capability:
  consumes:
  - type: http
    namespace: alpha-data-platform-positions
    baseUri: https://api.statestreet.com/v1
    description: State Street Alpha Data Platform API — Positions business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolioId-positions
      path: /portfolios/{portfolioId}/positions
      operations:
      - name: listportfoliopositions
        method: GET
        description: List Portfolio Positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          description: Unique portfolio identifier
          required: true
        - name: asOfDate
          in: query
          type: string
          description: As-of date for positions (defaults to latest available)
        - name: assetClass
          in: query
          type: string
          description: Filter by asset class
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.STATE_STREET_API_KEY}}'
  exposes:
  - type: rest
    namespace: alpha-data-platform-positions-rest
    port: 8080
    description: REST adapter for State Street Alpha Data Platform API — Positions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/portfolios/{portfolioid}/positions
      name: portfolios-portfolioid-positions
      description: REST surface for portfolios-portfolioId-positions.
      operations:
      - method: GET
        name: listportfoliopositions
        description: List Portfolio Positions
        call: alpha-data-platform-positions.listportfoliopositions
        with:
          portfolioId: rest.portfolioId
          asOfDate: rest.asOfDate
          assetClass: rest.assetClass
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: alpha-data-platform-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for State Street Alpha Data Platform API — Positions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-portfolio-positions
      description: List Portfolio Positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: alpha-data-platform-positions.listportfoliopositions
      with:
        portfolioId: tools.portfolioId
        asOfDate: tools.asOfDate
        assetClass: tools.assetClass
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
