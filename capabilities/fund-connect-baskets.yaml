naftiko: 1.0.0-alpha2
info:
  label: State Street Fund Connect API — Baskets
  description: 'State Street Fund Connect API — Baskets. 1 operations. Lead operation: Get ETF Portfolio Basket. Self-contained
    Naftiko capability covering one State Street business surface.'
  tags:
  - State Street
  - Baskets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATE_STREET_API_KEY: STATE_STREET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fund-connect-baskets
    baseUri: https://api.statestreet.com/v1/fund-connect
    description: State Street Fund Connect API — Baskets business capability. Self-contained, no shared references.
    resources:
    - name: funds-fundId-baskets
      path: /funds/{fundId}/baskets
      operations:
      - name: getfundbasket
        method: GET
        description: Get ETF Portfolio Basket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fundId
          in: path
          type: string
          description: Unique fund identifier
          required: true
        - name: date
          in: query
          type: string
          description: Date for which to retrieve the basket composition
    authentication:
      type: bearer
      token: '{{env.STATE_STREET_API_KEY}}'
  exposes:
  - type: rest
    namespace: fund-connect-baskets-rest
    port: 8080
    description: REST adapter for State Street Fund Connect API — Baskets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/funds/{fundid}/baskets
      name: funds-fundid-baskets
      description: REST surface for funds-fundId-baskets.
      operations:
      - method: GET
        name: getfundbasket
        description: Get ETF Portfolio Basket
        call: fund-connect-baskets.getfundbasket
        with:
          fundId: rest.fundId
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fund-connect-baskets-mcp
    port: 9090
    transport: http
    description: MCP adapter for State Street Fund Connect API — Baskets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-etf-portfolio-basket
      description: Get ETF Portfolio Basket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fund-connect-baskets.getfundbasket
      with:
        fundId: tools.fundId
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
