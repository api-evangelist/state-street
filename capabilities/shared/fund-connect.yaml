naftiko: "1.0.0-alpha1"

info:
  label: "State Street Fund Connect API"
  description: "Shared capability for the State Street Fund Connect API enabling ETF creation and redemption order management."
  tags:
    - Financial Services
    - ETF
    - Fund Management
    - Order Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STATE_STREET_CLIENT_ID: STATE_STREET_CLIENT_ID
      STATE_STREET_CLIENT_SECRET: STATE_STREET_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: state-street-fund-connect
      baseUri: https://api.statestreet.com/v1/fund-connect
      description: "State Street Fund Connect ETF Order Management API"
      authentication:
        type: bearer
        token: "{{STATE_STREET_ACCESS_TOKEN}}"
      resources:
        - name: funds
          path: /funds
          description: "ETF fund listing"
          operations:
            - name: list-funds
              method: GET
              description: "List ETF funds available on Fund Connect"
              inputParameters:
                - name: market
                  in: query
                  type: string
                  required: false
                  description: "Filter by market"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fund-detail
          path: /funds/{fundId}
          description: "Individual fund operations"
          operations:
            - name: get-fund
              method: GET
              description: "Get ETF fund details"
              inputParameters:
                - name: fundId
                  in: path
                  type: string
                  required: true
                  description: "Fund identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fund-baskets
          path: /funds/{fundId}/baskets
          description: "ETF portfolio basket"
          operations:
            - name: get-fund-basket
              method: GET
              description: "Get ETF portfolio composition basket"
              inputParameters:
                - name: fundId
                  in: path
                  type: string
                  required: true
                  description: "Fund identifier"
                - name: date
                  in: query
                  type: string
                  required: false
                  description: "Basket date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: orders
          path: /orders
          description: "ETF order management"
          operations:
            - name: create-order
              method: POST
              description: "Submit ETF creation or redemption order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fundId: "{{tools.fundId}}"
                  orderType: "{{tools.orderType}}"
                  units: "{{tools.units}}"
                  settlementType: "{{tools.settlementType}}"

            - name: list-orders
              method: GET
              description: "List ETF orders"
              inputParameters:
                - name: fundId
                  in: query
                  type: string
                  required: false
                  description: "Filter by fund"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: order-detail
          path: /orders/{orderId}
          description: "Individual order operations"
          operations:
            - name: get-order
              method: GET
              description: "Get ETF order status and details"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: order-cancel
          path: /orders/{orderId}/cancel
          description: "Order cancellation"
          operations:
            - name: cancel-order
              method: POST
              description: "Cancel a pending ETF order"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: state-street-fund-connect-rest
      resources:
        - path: /v1/etf/funds
          name: funds
          description: "ETF funds"
          operations:
            - method: GET
              name: list-funds
              description: "List ETF funds"
              call: "state-street-fund-connect.list-funds"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/etf/funds/{fundId}
          name: fund-detail
          description: "ETF fund detail"
          operations:
            - method: GET
              name: get-fund
              description: "Get fund"
              call: "state-street-fund-connect.get-fund"
              with:
                fundId: "rest.fundId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/etf/funds/{fundId}/baskets
          name: fund-baskets
          description: "ETF basket composition"
          operations:
            - method: GET
              name: get-fund-basket
              description: "Get basket"
              call: "state-street-fund-connect.get-fund-basket"
              with:
                fundId: "rest.fundId"
                date: "rest.date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/etf/orders
          name: orders
          description: "ETF orders"
          operations:
            - method: GET
              name: list-orders
              description: "List orders"
              call: "state-street-fund-connect.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-order
              description: "Submit order"
              call: "state-street-fund-connect.create-order"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/etf/orders/{orderId}
          name: order-detail
          description: "Order detail"
          operations:
            - method: GET
              name: get-order
              description: "Get order"
              call: "state-street-fund-connect.get-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: state-street-fund-connect-mcp
      transport: http
      tools:
        - name: list-etf-funds
          description: "List ETF funds available on State Street Fund Connect"
          hints:
            readOnly: true
            openWorld: false
          call: "state-street-fund-connect.list-funds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-etf-fund
          description: "Get details for a specific ETF fund on Fund Connect"
          hints:
            readOnly: true
            openWorld: false
          call: "state-street-fund-connect.get-fund"
          with:
            fundId: "tools.fundId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-etf-basket
          description: "Get the portfolio composition basket for an ETF fund"
          hints:
            readOnly: true
            openWorld: false
          call: "state-street-fund-connect.get-fund-basket"
          with:
            fundId: "tools.fundId"
            date: "tools.date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-etf-order
          description: "Submit an ETF creation or redemption order through Fund Connect"
          hints:
            readOnly: false
            openWorld: false
          call: "state-street-fund-connect.create-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-etf-orders
          description: "List ETF creation and redemption orders for the authenticated authorized participant"
          hints:
            readOnly: true
            openWorld: false
          call: "state-street-fund-connect.list-orders"
          with:
            fundId: "tools.fundId"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-etf-order
          description: "Get the status and details of a specific ETF order"
          hints:
            readOnly: true
            openWorld: false
          call: "state-street-fund-connect.get-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-etf-order
          description: "Cancel a pending ETF creation or redemption order"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "state-street-fund-connect.cancel-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
