naftiko: 1.0.0-alpha2
info:
  label: State Street Alpha Data Platform API — Performance
  description: 'State Street Alpha Data Platform API — Performance. 1 operations. Lead operation: Get Portfolio Performance.
    Self-contained Naftiko capability covering one State Street business surface.'
  tags:
  - State Street
  - Performance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATE_STREET_API_KEY: STATE_STREET_API_KEY
capability:
  consumes:
  - type: http
    namespace: alpha-data-platform-performance
    baseUri: https://api.statestreet.com/v1
    description: State Street Alpha Data Platform API — Performance business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolioId-performance
      path: /portfolios/{portfolioId}/performance
      operations:
      - name: getportfolioperformance
        method: GET
        description: Get Portfolio Performance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: portfolioId
          in: path
          type: string
          description: Unique portfolio identifier
          required: true
        - name: startDate
          in: query
          type: string
          description: Performance measurement start date
          required: true
        - name: endDate
          in: query
          type: string
          description: Performance measurement end date
          required: true
        - name: frequency
          in: query
          type: string
          description: Performance calculation frequency
    authentication:
      type: bearer
      token: '{{env.STATE_STREET_API_KEY}}'
  exposes:
  - type: rest
    namespace: alpha-data-platform-performance-rest
    port: 8080
    description: REST adapter for State Street Alpha Data Platform API — Performance. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/portfolios/{portfolioid}/performance
      name: portfolios-portfolioid-performance
      description: REST surface for portfolios-portfolioId-performance.
      operations:
      - method: GET
        name: getportfolioperformance
        description: Get Portfolio Performance
        call: alpha-data-platform-performance.getportfolioperformance
        with:
          portfolioId: rest.portfolioId
          startDate: rest.startDate
          endDate: rest.endDate
          frequency: rest.frequency
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: alpha-data-platform-performance-mcp
    port: 9090
    transport: http
    description: MCP adapter for State Street Alpha Data Platform API — Performance. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-portfolio-performance
      description: Get Portfolio Performance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: alpha-data-platform-performance.getportfolioperformance
      with:
        portfolioId: tools.portfolioId
        startDate: tools.startDate
        endDate: tools.endDate
        frequency: tools.frequency
      outputParameters:
      - type: object
        mapping: $.
